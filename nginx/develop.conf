server {
    listen 80;
    server_name _;

    proxy_buffer_size       16k;
    proxy_buffers           4 32k;
    proxy_busy_buffers_size 64k;

    # Common proxy headers
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;

    # ── API → Flask ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://develop-api:5000;
    }

    # ── Everything else → Flask (serves the built React SPA) ─────────────────
    # Flask's catch-all already returns index.html for unknown paths, so
    # no special 404 handling needed here.
    location / {
        proxy_pass http://develop-api:5000;
    }
}
