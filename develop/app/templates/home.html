<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pergola</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

  <!-- ── Launch screen ── -->
  <div class="launch">
    <div class="launch-card">

      <div class="launch-brand">pergola</div>

      <div class="launch-body">
        <p class="launch-section-label">Recent</p>
        <div id="recentList" class="recent-list">
          <div class="recent-empty">loading…</div>
        </div>
      </div>

      <div class="launch-footer">
        <button class="btn btn-ghost launch-btn" onclick="openModal('open')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
          Open folder
        </button>
        <button class="btn btn-primary launch-btn" onclick="openModal('create')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New app
        </button>
      </div>

    </div>
  </div>

  <!-- ── Shared file picker modal ── -->
  <div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
    <div class="modal-panel" id="modalPanel">

      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Open folder</span>
        <button class="modal-close" onclick="closeModal()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- create mode fields -->
      <div class="modal-form" id="modalForm">
        <input type="text" class="name-input" id="appName" placeholder="App name" oninput="onFormChange()" />
        <textarea class="desc-input" id="appDesc" placeholder="Describe your app…" rows="2" oninput="onFormChange()"></textarea>
        <p class="modal-section-label">Choose parent folder</p>
      </div>

      <div class="breadcrumbs" id="breadcrumbs"></div>

      <div class="dir-list" id="dirList">
        <div class="dir-loading">loading…</div>
      </div>

      <div class="modal-footer">
        <span class="footer-path" id="footerPath"></span>
        <span class="footer-error" id="footerError"></span>
        <button class="btn btn-primary" id="actionBtn" onclick="handleAction()" disabled>Open</button>
      </div>

    </div>
  </div>

  <script>
    let currentPath = null;
    let modalMode   = 'open';

    // ── Recent projects ──────────────────────────────────────────────
    async function loadRecent() {
      const el = document.getElementById('recentList');
      if (!el) return;
      const projects = await fetch('/api/projects').then(r => r.json());
      if (projects.length === 0) {
        el.innerHTML = '<div class="recent-empty">No recent projects</div>';
        return;
      }
      el.innerHTML = projects.map(p => `
        <button class="recent-item" onclick="openProject('${escapePath(p.path)}','${escapeAttr(p.name)}')">
          <svg class="recent-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
          <div class="recent-info">
            <span class="recent-name">${escapeHtml(p.name)}</span>
            <span class="recent-path">${escapeHtml(p.path)}</span>
          </div>
          <svg class="recent-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>`).join('');
    }

    async function openProject(path, name) {
      await fetch('/api/set-path', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path}) });
      await fetch('/api/projects', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, path}) });
      window.location.href = '/project';
    }

    // ── Modal ────────────────────────────────────────────────────────
    function openModal(mode) {
      modalMode   = mode;
      currentPath = null;

      const form      = document.getElementById('modalForm');
      const title     = document.getElementById('modalTitle');
      const actionBtn = document.getElementById('actionBtn');
      const panel     = document.getElementById('modalPanel');

      clearError();

      if (mode === 'create') {
        form.style.display    = 'flex';
        title.textContent     = 'New app';
        actionBtn.textContent = 'Create app';
        panel.classList.add('modal-panel--create');
        document.getElementById('appName').value = '';
        document.getElementById('appDesc').value = '';
      } else {
        form.style.display    = 'none';
        title.textContent     = 'Open folder';
        actionBtn.textContent = 'Open';
        panel.classList.remove('modal-panel--create');
      }

      actionBtn.disabled = true;
      document.getElementById('modal').classList.add('open');
      browse('~');

      if (mode === 'create') setTimeout(() => document.getElementById('appName').focus(), 220);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal')) closeModal();
    }

    function onFormChange() {
      updateActionBtn();
      updateFooterPath();
    }

    function updateActionBtn() {
      const btn  = document.getElementById('actionBtn');
      const name = document.getElementById('appName')?.value?.trim();
      btn.disabled = modalMode === 'create' ? (!currentPath || !name) : !currentPath;
    }

    function updateFooterPath() {
      const fp = document.getElementById('footerPath');
      if (modalMode === 'create' && currentPath) {
        const name       = document.getElementById('appName')?.value?.trim() || '';
        const folderName = name.replace(/ /g, '_') || '…';
        fp.textContent   = currentPath.replace(/\/$/, '') + '/' + folderName;
      } else if (currentPath) {
        fp.textContent = currentPath;
      }
    }

    function clearError() {
      document.getElementById('footerError').textContent = '';
    }

    // ── File browser ─────────────────────────────────────────────────
    async function browse(path) {
      document.getElementById('dirList').innerHTML = '<div class="dir-loading">loading…</div>';
      clearError();
      const res = await fetch('/api/browse?path=' + encodeURIComponent(path));
      if (!res.ok) {
        const err = await res.json();
        document.getElementById('dirList').innerHTML = `<div class="dir-error">${err.error}</div>`;
        return;
      }
      const data  = await res.json();
      currentPath = data.path;

      document.getElementById('breadcrumbs').innerHTML = data.breadcrumbs.map((c, i) =>
        `<button class="crumb" onclick="browse('${escapePath(c.path)}')">${escapeHtml(c.name)}</button>` +
        (i < data.breadcrumbs.length - 1 ? '<span class="crumb-sep">/</span>' : '')
      ).join('');

      const list = document.getElementById('dirList');
      list.innerHTML = data.dirs.length === 0
        ? '<div class="dir-empty">No subfolders</div>'
        : data.dirs.map(d =>
            `<button class="dir-item" onclick="browse('${escapePath(d.path)}')">
              <svg class="dir-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
              <span class="dir-name">${escapeHtml(d.name)}</span>
              <svg class="dir-chevron" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </button>`
          ).join('');

      updateFooterPath();
      updateActionBtn();
    }

    // ── Actions ──────────────────────────────────────────────────────
    async function handleAction() {
      if (!currentPath) return;
      if (modalMode === 'open') {
        const name = currentPath.split('/').filter(Boolean).pop();
        await fetch('/api/set-path', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path: currentPath}) });
        await fetch('/api/projects', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, path: currentPath}) });
        window.location.href = '/project';
      } else {
        const name        = document.getElementById('appName').value.trim();
        const description = document.getElementById('appDesc').value.trim();
        const btn         = document.getElementById('actionBtn');

        btn.disabled      = true;
        btn.textContent   = 'Creating…';
        clearError();

        const res  = await fetch('/api/create-app', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description, parent_path: currentPath })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/project';
        } else {
          document.getElementById('footerError').textContent = data.error;
          btn.disabled    = false;
          btn.textContent = 'Create app';
        }
      }
    }

    // ── Util ─────────────────────────────────────────────────────────
    function escapeHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escapeAttr(s)  { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
    function escapePath(s)  { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    loadRecent();
  </script>
</body>
</html>
